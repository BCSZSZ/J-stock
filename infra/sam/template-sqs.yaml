AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: J-Stock-Analyzer without Step Functions (EventBridge + SQS + Lambda workers)

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  ScheduleExpression:
    Type: String
    Default: cron(30 7 ? * MON-FRI *)

  MonitorListS3Uri:
    Type: String
    Default: ""

  TickersPerJob:
    Type: Number
    Default: 100

  FetchWorkerMaxConcurrency:
    Type: Number
    Default: 2
    MinValue: 2

  JQuantsRateLimitRpm:
    Type: Number
    Default: 24

  SectorPoolS3Uri:
    Type: String
    Default: ""

  UpdateAuxData:
    Type: String
    Default: "false"

  WorkerMemoryMB:
    Type: Number
    Default: 2048

  JQuantsApiKey:
    Type: String
    NoEcho: true
    Default: ""

  DataS3Prefix:
    Type: String
    Default: ""

  OpsS3Prefix:
    Type: String
    Default: ""

  DailyNoFetchScheduleExpression:
    Type: String
    Default: cron(0 12 ? * MON-FRI *)

  Validation1830ScheduleExpression:
    Type: String
    Default: cron(30 9 ? * MON-FRI *)

  Validation1900ScheduleExpression:
    Type: String
    Default: cron(0 10 ? * MON-FRI *)

  NotifyEmail:
    Type: String
    Default: ""

  ReportSigningAccessKeyId:
    Type: String
    Default: ""
    Description: IAM user access key ID for signing report presigned URLs. When set, URLs use long-term credentials and respect the full TTL (up to 7 days). Leave empty to use Lambda execution role (URL expires with STS session ~1h).

  ReportSigningSecretAccessKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: IAM user secret access key paired with ReportSigningAccessKeyId.

Globals:
  Function:
    Runtime: python3.12
    Tracing: Active
    Tags:
      Project: AI-stock

Conditions:
  HasNotifyEmail: !Not [!Equals [!Ref NotifyEmail, ""]]

Resources:
  DataProcessingLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub jsa-${EnvironmentName}-data-processing
      Description: Shared runtime dependencies for data processing lambdas
      ContentUri: layers/data
      CompatibleRuntimes:
        - python3.12
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.12

  FetchJobQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub jsa-${EnvironmentName}-fetch-jobs
      VisibilityTimeout: 1200
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FetchJobDLQ.Arn
        maxReceiveCount: 3

  FetchJobDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub jsa-${EnvironmentName}-fetch-jobs-dlq

  DispatchFetchJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: src.aws.handlers.dispatch_fetch_jobs.handler
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          FETCH_JOB_QUEUE_URL: !Ref FetchJobQueue
          MONITOR_LIST_S3_URI: !Ref MonitorListS3Uri
          TICKERS_PER_JOB: !Ref TickersPerJob
          UPDATE_AUX_DATA: !Ref UpdateAuxData
          DATA_S3_PREFIX: !Ref DataS3Prefix
          SECTOR_POOL_S3_URI: !Ref SectorPoolS3Uri
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt FetchJobQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource: "*"

  FetchWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: src.aws.handlers.fetch_worker.handler
      Timeout: 900
      MemorySize: !Ref WorkerMemoryMB
      Layers:
        - !Ref DataProcessingLayer
      Environment:
        Variables:
          DATA_ROOT: /tmp/data
          JQUANTS_API_KEY: !Ref JQuantsApiKey
          DATA_S3_PREFIX: !Ref DataS3Prefix
          JQUANTS_RATE_LIMIT_RPM: !Ref JQuantsRateLimitRpm
      Events:
        FetchQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt FetchJobQueue.Arn
            BatchSize: 1
            ScalingConfig:
              MaximumConcurrency: !Ref FetchWorkerMaxConcurrency
            Enabled: true
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: "arn:aws:s3:::*"

  DailyNoFetchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: src.aws.handlers.run_daily_no_fetch.handler
      Timeout: 900
      MemorySize: 2048
      Layers:
        - !Ref DataProcessingLayer
      Environment:
        Variables:
          MONITOR_LIST_S3_URI: !Ref MonitorListS3Uri
          DATA_S3_PREFIX: !Ref DataS3Prefix
          OPS_S3_PREFIX: !Ref OpsS3Prefix
          JQUANTS_API_KEY: !Ref JQuantsApiKey
          NOTIFY_SNS_TOPIC_ARN: !Ref DailyNotifyTopic
          REPORT_SIGNING_ACCESS_KEY_ID: !Ref ReportSigningAccessKeyId
          REPORT_SIGNING_SECRET_ACCESS_KEY: !Ref ReportSigningSecretAccessKey
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: "arn:aws:s3:::*"
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref DailyNotifyTopic

  ValidateReadinessFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../
      Handler: src.aws.handlers.validate_readiness.handler
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          MONITOR_LIST_S3_URI: !Ref MonitorListS3Uri
          DATA_S3_PREFIX: !Ref DataS3Prefix
          OPS_S3_PREFIX: !Ref OpsS3Prefix
          DISPATCH_FUNCTION_NAME: !Ref DispatchFetchJobsFunction
          TICKERS_PER_JOB: !Ref TickersPerJob
          UPDATE_AUX_DATA: !Ref UpdateAuxData
          SECTOR_POOL_S3_URI: !Ref SectorPoolS3Uri
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:ListBucket
              Resource: "*"
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt DispatchFetchJobsFunction.Arn

  DailyNotifyTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub jsa-${EnvironmentName}-daily-notify

  DailyNotifySubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotifyEmail
    Properties:
      Protocol: email
      TopicArn: !Ref DailyNotifyTopic
      Endpoint: !Ref NotifyEmail

  DailyDispatchSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Dispatch daily fetch jobs to SQS
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Target:
        Arn: !GetAtt DispatchFetchJobsFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeLambdaRole.Arn
        Input: !Sub |
          {
            "tickers_per_job": ${TickersPerJob},
            "update_aux_data": false
          }

  DailyNoFetchSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Run production daily with --no-fetch at fixed time
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref DailyNoFetchScheduleExpression
      State: ENABLED
      Target:
        Arn: !GetAtt DailyNoFetchFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeLambdaRole.Arn
        Input: "{}"

  Validation1830Schedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Validate data readiness at 18:30 JST and re-dispatch if needed
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref Validation1830ScheduleExpression
      State: ENABLED
      Target:
        Arn: !GetAtt ValidateReadinessFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeLambdaRole.Arn
        Input: '{"attempt":"1830","allow_redispatch":true}'

  Validation1900Schedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Description: Validate data readiness at 19:00 JST and lock final state
      FlexibleTimeWindow:
        Mode: "OFF"
      ScheduleExpression: !Ref Validation1900ScheduleExpression
      State: ENABLED
      Target:
        Arn: !GetAtt ValidateReadinessFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeLambdaRole.Arn
        Input: '{"attempt":"1900","allow_redispatch":false}'

  SchedulerInvokeLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDispatchFunction
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt DispatchFetchJobsFunction.Arn
                  - !GetAtt DailyNoFetchFunction.Arn
                  - !GetAtt ValidateReadinessFunction.Arn

  FetchWorkerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub jsa-${EnvironmentName}-fetch-worker-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FetchWorkerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  DailyNoFetchErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub jsa-${EnvironmentName}-daily-no-fetch-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DailyNoFetchFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  FetchJobDLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub jsa-${EnvironmentName}-fetch-dlq-depth
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FetchJobDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ValidateReadinessErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub jsa-${EnvironmentName}-validate-readiness-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ValidateReadinessFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  FetchJobQueueUrl:
    Value: !Ref FetchJobQueue
  DispatchFunctionArn:
    Value: !GetAtt DispatchFetchJobsFunction.Arn
  FetchWorkerArn:
    Value: !GetAtt FetchWorkerFunction.Arn
  DailyNoFetchArn:
    Value: !GetAtt DailyNoFetchFunction.Arn
  ValidateReadinessArn:
    Value: !GetAtt ValidateReadinessFunction.Arn
  DailyNotifyTopicArn:
    Value: !Ref DailyNotifyTopic
  DataProcessingLayerArn:
    Value: !Ref DataProcessingLayer
