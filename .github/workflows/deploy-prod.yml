name: Deploy AWS Main (SQS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_ROLE_TO_ASSUME_INPUT: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            infra
            src
            main.py
            config.local.json
            config.json
            config.json.example
            requirements.txt
            requirements-lambda.txt
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Preflight - AWS role configured
        shell: bash
        run: test -n "${AWS_ROLE_TO_ASSUME_INPUT}"

      - name: Preflight - AWS_REGION configured
        shell: bash
        run: test -n "${{ vars.AWS_REGION }}"

      - name: Preflight - MONITOR_LIST_S3_URI configured
        shell: bash
        run: test -n "${{ vars.MONITOR_LIST_S3_URI }}"

      - name: Preflight - DATA_S3_PREFIX configured
        shell: bash
        run: test -n "${{ vars.DATA_S3_PREFIX }}"

      - name: Preflight - OPS_S3_PREFIX configured
        shell: bash
        run: test -n "${{ vars.OPS_S3_PREFIX }}"

      - name: Preflight - JQUANTS_API_KEY configured
        shell: bash
        run: test -n "${{ secrets.JQUANTS_API_KEY }}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_INPUT }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: SAM Validate
        run: sam validate --template-file infra/sam/template-sqs.yaml

      - name: Prepare slim lambda requirements
        shell: bash
        run: cp requirements-lambda.txt requirements.txt

      - name: SAM Build
        run: sam build --template-file infra/sam/template-sqs.yaml

      - name: Inspect build artifact sizes
        shell: bash
        run: |
          set -euo pipefail
          du -sh .aws-sam/build/* | sort -h

      - name: SAM Deploy (main)
        shell: bash
        env:
          MONITOR_LIST_S3_URI_INPUT: ${{ vars.MONITOR_LIST_S3_URI }}
          DATA_S3_PREFIX_INPUT: ${{ vars.DATA_S3_PREFIX }}
          OPS_S3_PREFIX_INPUT: ${{ vars.OPS_S3_PREFIX }}
          TICKERS_PER_JOB_INPUT: ${{ vars.TICKERS_PER_JOB }}
          UPDATE_AUX_DATA_INPUT: ${{ vars.UPDATE_AUX_DATA }}
          WORKER_MEMORY_MB_INPUT: ${{ vars.WORKER_MEMORY_MB }}
          NOTIFY_EMAIL_INPUT: ${{ vars.NOTIFY_EMAIL }}
          JQUANTS_API_KEY_INPUT: ${{ secrets.JQUANTS_API_KEY }}
        run: |
          set -euo pipefail
          cp infra/sam/samconfig.toml .aws-samconfig.resolved.toml
          sed -i "s|__MONITOR_LIST_S3_URI__|${MONITOR_LIST_S3_URI_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__DATA_S3_PREFIX__|${DATA_S3_PREFIX_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__OPS_S3_PREFIX__|${OPS_S3_PREFIX_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__TICKERS_PER_JOB__|${TICKERS_PER_JOB_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__UPDATE_AUX_DATA__|${UPDATE_AUX_DATA_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__WORKER_MEMORY_MB__|${WORKER_MEMORY_MB_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__NOTIFY_EMAIL__|${NOTIFY_EMAIL_INPUT}|g" .aws-samconfig.resolved.toml
          sed -i "s|__JQUANTS_API_KEY__|${JQUANTS_API_KEY_INPUT}|g" .aws-samconfig.resolved.toml

          sam deploy \
            --config-file .aws-samconfig.resolved.toml \
            --config-env prod
