name: Deploy AWS Main (SQS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ROLE_TO_ASSUME_INPUT: ${{ secrets.AWS_ROLE_TO_ASSUME || vars.AWS_ROLE_TO_ASSUME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Preflight CI config check
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AWS_ROLE_TO_ASSUME_INPUT}" || { echo "Missing AWS role: set AWS_ROLE_TO_ASSUME in Secrets or Variables"; exit 1; }
          test -n "${{ vars.AWS_REGION }}" || { echo "Missing variable AWS_REGION"; exit 1; }
          test -n "${{ vars.MONITOR_LIST_S3_URI }}" || { echo "Missing variable MONITOR_LIST_S3_URI"; exit 1; }
          test -n "${{ vars.DATA_S3_PREFIX }}" || { echo "Missing variable DATA_S3_PREFIX"; exit 1; }
          test -n "${{ vars.OPS_S3_PREFIX }}" || { echo "Missing variable OPS_S3_PREFIX"; exit 1; }
          test -n "${{ secrets.JQUANTS_API_KEY }}" || { echo "Missing secret JQUANTS_API_KEY"; exit 1; }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_INPUT }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: SAM Validate
        run: sam validate --template-file infra/sam/template-sqs.yaml

      - name: SAM Build
        run: sam build --template-file infra/sam/template-sqs.yaml

      - name: SAM Deploy (main)
        run: |
          sam deploy \
            --stack-name jsa-main-sqs \
            --template-file .aws-sam/build/template.yaml \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              EnvironmentName=prod \
              MonitorListS3Uri=${{ vars.MONITOR_LIST_S3_URI }} \
              DataS3Prefix=${{ vars.DATA_S3_PREFIX }} \
              OpsS3Prefix=${{ vars.OPS_S3_PREFIX }} \
              TickersPerJob=${{ vars.TICKERS_PER_JOB }} \
              UpdateAuxData='${{ vars.UPDATE_AUX_DATA }}' \
              ScheduleExpression='${{ vars.SCHEDULE_EXPRESSION }}' \
              DailyNoFetchScheduleExpression='${{ vars.DAILY_NO_FETCH_SCHEDULE_EXPRESSION }}' \
              WorkerMemoryMB=${{ vars.WORKER_MEMORY_MB }} \
              NotifyEmail='${{ vars.NOTIFY_EMAIL }}' \
              JQuantsApiKey=${{ secrets.JQUANTS_API_KEY }}
